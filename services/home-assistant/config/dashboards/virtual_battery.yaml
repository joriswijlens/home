title: "Virtuele Batterij"
views:
  - title: Overzicht
    type: sections
    max_columns: 2
    sections:
      # Rij 1: 4 percentage gauges op 1 rij in kolom 1
      - type: grid
        cards:
          - type: heading
            heading: "Batterij %"
            heading_style: subtitle
          - type: gauge
            entity: sensor.vb_10kwh_soc
            name: "10 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: gauge
            entity: sensor.vb_20kwh_soc
            name: "20 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: gauge
            entity: sensor.vb_30kwh_soc
            name: "30 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: gauge
            entity: sensor.vb_40kwh_soc
            name: "40 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
      # Rij 1 kolom 2: 4 kWh gauges op 1 rij
      - type: grid
        cards:
          - type: heading
            heading: "Batterij kWh"
            heading_style: subtitle
          - type: gauge
            entity: sensor.vb_10kwh_opgeslagen
            name: "10 kWh"
            min: 0
            max: 10
            severity:
              green: 5
              yellow: 2
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: gauge
            entity: sensor.vb_20kwh_opgeslagen
            name: "20 kWh"
            min: 0
            max: 20
            severity:
              green: 10
              yellow: 4
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: gauge
            entity: sensor.vb_30kwh_opgeslagen
            name: "30 kWh"
            min: 0
            max: 30
            severity:
              green: 15
              yellow: 6
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
          - type: gauge
            entity: sensor.vb_40kwh_opgeslagen
            name: "40 kWh"
            min: 0
            max: 40
            severity:
              green: 20
              yellow: 8
              red: 0
            layout_options:
              grid_columns: 2
              grid_rows: 2
      # Vandaag 10 kWh
      - type: grid
        cards:
          - type: heading
            heading: "Vandaag"
            heading_style: subtitle
          - type: entities
            title: "10 kWh"
            entities:
              - entity: sensor.vb_10kwh_besparing_dag
                name: "Besparing"
              - entity: sensor.vb_10kwh_energy_in_dag
                name: "Energy In"
              - entity: sensor.vb_10kwh_energy_out_dag
                name: "Energy Out"
          - type: entities
            title: "30 kWh"
            entities:
              - entity: sensor.vb_30kwh_besparing_dag
                name: "Besparing"
              - entity: sensor.vb_30kwh_energy_in_dag
                name: "Energy In"
              - entity: sensor.vb_30kwh_energy_out_dag
                name: "Energy Out"
      # Vandaag 20+40 kWh
      - type: grid
        cards:
          - type: heading
            heading: " "
            heading_style: subtitle
          - type: entities
            title: "20 kWh"
            entities:
              - entity: sensor.vb_20kwh_besparing_dag
                name: "Besparing"
              - entity: sensor.vb_20kwh_energy_in_dag
                name: "Energy In"
              - entity: sensor.vb_20kwh_energy_out_dag
                name: "Energy Out"
          - type: entities
            title: "40 kWh"
            entities:
              - entity: sensor.vb_40kwh_besparing_dag
                name: "Besparing"
              - entity: sensor.vb_40kwh_energy_in_dag
                name: "Energy In"
              - entity: sensor.vb_40kwh_energy_out_dag
                name: "Energy Out"
      # Deze maand 10+30 kWh
      - type: grid
        cards:
          - type: heading
            heading: "Deze maand"
            heading_style: subtitle
          - type: entities
            title: "10 kWh"
            entities:
              - entity: sensor.vb_10kwh_bruto_zelfconsumptie_maand
                name: "Besparing"
              - entity: sensor.vb_10kwh_energy_in_maand
                name: "Energy In"
              - entity: sensor.vb_10kwh_energy_out_maand
                name: "Energy Out"
          - type: entities
            title: "30 kWh"
            entities:
              - entity: sensor.vb_30kwh_bruto_zelfconsumptie_maand
                name: "Besparing"
              - entity: sensor.vb_30kwh_energy_in_maand
                name: "Energy In"
              - entity: sensor.vb_30kwh_energy_out_maand
                name: "Energy Out"
      # Deze maand 20+40 kWh
      - type: grid
        cards:
          - type: heading
            heading: " "
            heading_style: subtitle
          - type: entities
            title: "20 kWh"
            entities:
              - entity: sensor.vb_20kwh_bruto_zelfconsumptie_maand
                name: "Besparing"
              - entity: sensor.vb_20kwh_energy_in_maand
                name: "Energy In"
              - entity: sensor.vb_20kwh_energy_out_maand
                name: "Energy Out"
          - type: entities
            title: "40 kWh"
            entities:
              - entity: sensor.vb_40kwh_bruto_zelfconsumptie_maand
                name: "Besparing"
              - entity: sensor.vb_40kwh_energy_in_maand
                name: "Energy In"
              - entity: sensor.vb_40kwh_energy_out_maand
                name: "Energy Out"
      # Status
      - type: grid
        cards:
          - type: heading
            heading: "Status"
            heading_style: subtitle
          - type: entity
            entity: sensor.zonneplan_current_electricity_tariff
            name: "Zonneplan Tarief"
            icon: mdi:currency-eur
          - type: entity
            entity: sensor.zonneplan_current_tariff_group
            name: "Tariefgroep"
          - type: entity
            entity: input_number.virtual_ev_daily_kwh
            name: "EV Dagelijks"
            icon: mdi:car-electric
          - type: entity
            entity: input_number.virtual_ev_consumed_today
            name: "EV Geladen Vandaag"

  - title: Grafieken
    icon: mdi:chart-line
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: entity
            entity: input_select.virtual_battery_chart_period
            name: "Periode"
          - type: conditional
            conditions:
              - entity: input_select.virtual_battery_chart_period
                state: "3 maanden"
            card:
              type: vertical-stack
              cards:
                - type: custom:apexcharts-card
                  header:
                    title: "Besparing per maand"
                    show: true
                  graph_span: 3month
                  span:
                    end: month
                  apex_config:
                    legend:
                      show: false
                    tooltip:
                      x:
                        format: "MMM yyyy"
                    xaxis:
                      labels:
                        datetimeFormatter:
                          month: "MMM"
                  series:
                    - entity: sensor.vb_10kwh_bruto_zelfconsumptie
                      name: "10 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_20kwh_bruto_zelfconsumptie
                      name: "20 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_30kwh_bruto_zelfconsumptie
                      name: "30 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_40kwh_bruto_zelfconsumptie
                      name: "40 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                - type: markdown
                  content: >
                    <center><b>Totaal</b> · 10 kWh: <b>€ {{ states('sensor.vb_10kwh_bruto_zelfconsumptie') }}</b> · 20 kWh: <b>€ {{ states('sensor.vb_20kwh_bruto_zelfconsumptie') }}</b> · 30 kWh: <b>€ {{ states('sensor.vb_30kwh_bruto_zelfconsumptie') }}</b> · 40 kWh: <b>€ {{ states('sensor.vb_40kwh_bruto_zelfconsumptie') }}</b></center>
          - type: conditional
            conditions:
              - entity: input_select.virtual_battery_chart_period
                state: "6 maanden"
            card:
              type: vertical-stack
              cards:
                - type: custom:apexcharts-card
                  header:
                    title: "Besparing per maand"
                    show: true
                  graph_span: 6month
                  span:
                    end: month
                  apex_config:
                    legend:
                      show: false
                    tooltip:
                      x:
                        format: "MMM yyyy"
                    xaxis:
                      labels:
                        datetimeFormatter:
                          month: "MMM"
                  series:
                    - entity: sensor.vb_10kwh_bruto_zelfconsumptie
                      name: "10 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_20kwh_bruto_zelfconsumptie
                      name: "20 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_30kwh_bruto_zelfconsumptie
                      name: "30 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_40kwh_bruto_zelfconsumptie
                      name: "40 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                - type: markdown
                  content: >
                    <center><b>Totaal</b> · 10 kWh: <b>€ {{ states('sensor.vb_10kwh_bruto_zelfconsumptie') }}</b> · 20 kWh: <b>€ {{ states('sensor.vb_20kwh_bruto_zelfconsumptie') }}</b> · 30 kWh: <b>€ {{ states('sensor.vb_30kwh_bruto_zelfconsumptie') }}</b> · 40 kWh: <b>€ {{ states('sensor.vb_40kwh_bruto_zelfconsumptie') }}</b></center>
          - type: conditional
            conditions:
              - entity: input_select.virtual_battery_chart_period
                state: "12 maanden"
            card:
              type: vertical-stack
              cards:
                - type: custom:apexcharts-card
                  header:
                    title: "Besparing per maand"
                    show: true
                  graph_span: 12month
                  span:
                    end: month
                  apex_config:
                    legend:
                      show: false
                    tooltip:
                      x:
                        format: "MMM yyyy"
                    xaxis:
                      labels:
                        datetimeFormatter:
                          month: "MMM"
                  series:
                    - entity: sensor.vb_10kwh_bruto_zelfconsumptie
                      name: "10 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_20kwh_bruto_zelfconsumptie
                      name: "20 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_30kwh_bruto_zelfconsumptie
                      name: "30 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                    - entity: sensor.vb_40kwh_bruto_zelfconsumptie
                      name: "40 kWh"
                      type: column
                      statistics:
                        type: change
                        period: month
                - type: markdown
                  content: >
                    <center><b>Totaal</b> · 10 kWh: <b>€ {{ states('sensor.vb_10kwh_bruto_zelfconsumptie') }}</b> · 20 kWh: <b>€ {{ states('sensor.vb_20kwh_bruto_zelfconsumptie') }}</b> · 30 kWh: <b>€ {{ states('sensor.vb_30kwh_bruto_zelfconsumptie') }}</b> · 40 kWh: <b>€ {{ states('sensor.vb_40kwh_bruto_zelfconsumptie') }}</b></center>

  - title: Instellingen
    icon: mdi:cog
    cards:
      - type: entities
        title: "Simulatie Instellingen"
        entities:
          - entity: input_number.virtual_battery_max_charge_rate
            name: "Max Charge Rate"
          - entity: input_number.virtual_battery_min_soc
            name: "Min SoC"
          - entity: input_number.virtual_battery_discharge_min_price
            name: "Ontlaad Minimumprijs"
          - entity: input_number.virtual_battery_discharge_top_percent
            name: "Ontlaad Top % Uren"
          - entity: input_number.virtual_ev_daily_kwh
            name: "EV Dagelijks laden"
