title: "Virtuele Batterij"
views:
  - title: Overzicht
    type: sections
    sections:
      # --- Status ---
      - type: grid
        cards:
          - type: entity
            entity: sensor.zonneplan_current_electricity_tariff
            name: "Zonneplan Tarief"
            icon: mdi:currency-eur
          - type: entity
            entity: sensor.zonneplan_current_tariff_group
            name: "Tariefgroep"
          - type: entity
            entity: input_number.virtual_ev_daily_kwh
            name: "EV Dagelijks"
            icon: mdi:car-electric
          - type: entity
            entity: input_number.virtual_ev_consumed_today
            name: "EV Geladen Vandaag"

      # --- SoC Gauges ---
      - type: grid
        title: "State of Charge"
        cards:
          - type: gauge
            entity: sensor.vb_10kwh_soc
            name: "10 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: gauge
            entity: sensor.vb_20kwh_soc
            name: "20 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: gauge
            entity: sensor.vb_30kwh_soc
            name: "30 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: gauge
            entity: sensor.vb_40kwh_soc
            name: "40 kWh"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0

      # --- Zelfconsumptie Besparing ---
      - type: grid
        title: "Zelfconsumptie Besparing (vast tarief)"
        cards:
          - type: statistic
            entity: sensor.vb_10kwh_zelfconsumptie
            name: "10 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_20kwh_zelfconsumptie
            name: "20 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_30kwh_zelfconsumptie
            name: "30 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_40kwh_zelfconsumptie
            name: "40 kWh"
            period:
              calendar:
                period: month
            stat_type: change

      # --- Verkoop Overschot ---
      - type: grid
        title: "Verkoop Overschot (dynamisch tarief)"
        cards:
          - type: statistic
            entity: sensor.vb_10kwh_verkoop_overschot
            name: "10 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_20kwh_verkoop_overschot
            name: "20 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_30kwh_verkoop_overschot
            name: "30 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_40kwh_verkoop_overschot
            name: "40 kWh"
            period:
              calendar:
                period: month
            stat_type: change

      # --- Arbitrage Day-Ahead ---
      - type: grid
        title: "Arbitrage Bonus (dynamisch vs vast)"
        cards:
          - type: statistic
            entity: sensor.vb_10kwh_arbitrage
            name: "10 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_20kwh_arbitrage
            name: "20 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_30kwh_arbitrage
            name: "30 kWh"
            period:
              calendar:
                period: month
            stat_type: change
          - type: statistic
            entity: sensor.vb_40kwh_arbitrage
            name: "40 kWh"
            period:
              calendar:
                period: month
            stat_type: change

      # --- Cumulatieve Totalen ---
      - type: grid
        title: "Cumulatief Totaal"
        cards:
          - type: entities
            title: "10 kWh"
            entities:
              - entity: sensor.vb_10kwh_zelfconsumptie
                name: "Zelfconsumptie"
              - entity: sensor.vb_10kwh_verkoop_overschot
                name: "Verkoop overschot"
              - entity: sensor.vb_10kwh_arbitrage
                name: "Arbitrage"
              - entity: sensor.vb_10kwh_energy_in
                name: "Energy In"
              - entity: sensor.vb_10kwh_energy_out
                name: "Energy Out"
          - type: entities
            title: "20 kWh"
            entities:
              - entity: sensor.vb_20kwh_zelfconsumptie
                name: "Zelfconsumptie"
              - entity: sensor.vb_20kwh_verkoop_overschot
                name: "Verkoop overschot"
              - entity: sensor.vb_20kwh_arbitrage
                name: "Arbitrage"
              - entity: sensor.vb_20kwh_energy_in
                name: "Energy In"
              - entity: sensor.vb_20kwh_energy_out
                name: "Energy Out"
          - type: entities
            title: "30 kWh"
            entities:
              - entity: sensor.vb_30kwh_zelfconsumptie
                name: "Zelfconsumptie"
              - entity: sensor.vb_30kwh_verkoop_overschot
                name: "Verkoop overschot"
              - entity: sensor.vb_30kwh_arbitrage
                name: "Arbitrage"
              - entity: sensor.vb_30kwh_energy_in
                name: "Energy In"
              - entity: sensor.vb_30kwh_energy_out
                name: "Energy Out"
          - type: entities
            title: "40 kWh"
            entities:
              - entity: sensor.vb_40kwh_zelfconsumptie
                name: "Zelfconsumptie"
              - entity: sensor.vb_40kwh_verkoop_overschot
                name: "Verkoop overschot"
              - entity: sensor.vb_40kwh_arbitrage
                name: "Arbitrage"
              - entity: sensor.vb_40kwh_energy_in
                name: "Energy In"
              - entity: sensor.vb_40kwh_energy_out
                name: "Energy Out"

      # --- Parameters ---
      - type: grid
        title: "Instellingen"
        cards:
          - type: entities
            entities:
              - entity: input_number.virtual_battery_max_charge_rate
                name: "Max Charge Rate"
              - entity: input_number.virtual_battery_min_soc
                name: "Min SoC"
              - entity: input_number.virtual_battery_flat_elec_price
                name: "Vast stroomtarief"
              - entity: input_number.virtual_battery_flat_feedin_price
                name: "Vast feedin tarief"
              - entity: input_number.virtual_ev_daily_kwh
                name: "EV Dagelijks laden"
