# Virtual Battery Simulation Package
#
# Simulates 4 battery sizes (10, 20, 30, 40 kWh) in parallel.
# Includes a virtual EV that consumes 5 kWh/day from solar excess BEFORE
# the battery gets it, reducing the battery's business case.
#
# Tracks 2 financial values per battery:
#   1. Zelfconsumptie: savings from self-consumption at dynamic Zonneplan tariff
#   2. Verkoop overschot: revenue from solar excess at dynamic feed-in tariff
#
# Uses Slimmelezer (grid), Enphase Envoy (solar), Zonneplan (dynamic tariffs).
# Does NOT account for saldering (net metering).

input_number:
  # Shared battery parameters
  virtual_battery_max_charge_rate:
    name: "Virtual Battery Max Charge/Discharge Rate"
    unit_of_measurement: "kW"
    min: 0.5
    max: 15
    step: 0.5
    icon: mdi:lightning-bolt

  virtual_battery_min_soc:
    name: "Virtual Battery Minimum SoC"
    unit_of_measurement: "kWh"
    min: 0
    max: 10
    step: 0.5
    icon: mdi:battery-low

  # Virtual EV - consumes solar excess before battery
  virtual_ev_daily_kwh:
    name: "Virtual EV Daily Charge"
    unit_of_measurement: "kWh"
    min: 0
    max: 50
    step: 1
    icon: mdi:car-electric

  virtual_ev_consumed_today:
    name: "Virtual EV Consumed Today"
    unit_of_measurement: "kWh"
    min: 0
    max: 50
    step: 0.001

  # --- 10 kWh state ---
  virtual_battery_10_soc:
    name: "VB 10kWh SoC"
    min: 0
    max: 100
    step: 0.01
  virtual_battery_10_energy_in:
    name: "VB 10kWh Energy In"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_10_energy_out:
    name: "VB 10kWh Energy Out"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_10_savings_self:
    name: "VB 10kWh Zelfconsumptie"
    min: -9999999
    max: 9999999
    step: 0.001
  virtual_battery_10_revenue_export:
    name: "VB 10kWh Verkoop Overschot"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_10_savings_arbitrage:
    name: "VB 10kWh Arbitrage"
    min: -9999999
    max: 9999999
    step: 0.001

  # --- 20 kWh state ---
  virtual_battery_20_soc:
    name: "VB 20kWh SoC"
    min: 0
    max: 100
    step: 0.01
  virtual_battery_20_energy_in:
    name: "VB 20kWh Energy In"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_20_energy_out:
    name: "VB 20kWh Energy Out"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_20_savings_self:
    name: "VB 20kWh Zelfconsumptie"
    min: -9999999
    max: 9999999
    step: 0.001
  virtual_battery_20_revenue_export:
    name: "VB 20kWh Verkoop Overschot"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_20_savings_arbitrage:
    name: "VB 20kWh Arbitrage"
    min: -9999999
    max: 9999999
    step: 0.001

  # --- 30 kWh state ---
