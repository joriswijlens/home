automation:
  - id: virtual_ev_daily_reset
    alias: "Virtual EV - Daily reset"
    description: "Reset EV consumed counter at midnight"
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_ev_consumed_today
        data:
          value: 0

  - id: virtual_battery_simulation
    alias: "Virtual Battery - Simulate all batteries"
    description: "Runs every minute to simulate 4 battery sizes with 3 value streams"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      - variables:
          # Grid power (kW)
          raw_export_power: "{{ states('sensor.connect_energiemeter_elektriciteitsproductie') | float(0) / 1000 }}"
          import_power: "{{ states('sensor.connect_energiemeter_elektriciteitsverbruik') | float(0) / 1000 }}"
          # Shared params
          max_rate: "{{ states('input_number.virtual_battery_max_charge_rate') | float(5) }}"
          min_soc: "{{ states('input_number.virtual_battery_min_soc') | float(1) }}"
          # Dynamic Zonneplan tariff
          dyn_elec: "{{ states('sensor.zonneplan_current_electricity_tariff') | float(0.25) }}"
          dyn_feedin: >
            {% set forecast = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
            {% if forecast %}
              {% set now_hour = now().strftime('%Y-%m-%dT%H:00:00') %}
              {% set current = forecast | selectattr('datetime', 'search', now_hour) | list %}
              {% if current %}
                {{ (current[0].electricity_price_excl_tax / 10000000) * 1.10 }}
              {% else %}
                {{ 0.07 }}
              {% endif %}
            {% else %}
              {{ 0.07 }}
            {% endif %}
          # Discharge price logic
          discharge_min_price: "{{ states('input_number.virtual_battery_discharge_min_price') | float(0.15) }}"
          discharge_top_pct: "{{ states('input_number.virtual_battery_discharge_top_percent') | float(50) }}"
          discharge_price_threshold: >
            {% set forecast = state_attr('sensor.zonneplan_current_electricity_tariff', 'forecast') %}
            {% if forecast %}
              {% set remaining = forecast | selectattr('datetime', 'ge', now().strftime('%Y-%m-%dT%H:00:00')) | list %}
              {% set today_remaining = remaining | selectattr('datetime', 'search', now().strftime('%Y-%m-%d')) | list %}
              {% if today_remaining | length > 0 %}
                {% set prices = today_remaining | map(attribute='electricity_price') | map('float') | sort | list %}
                {% set idx = [((1 - (discharge_top_pct | float) / 100) * (prices | length)) | int, 0] | max %}
                {{ prices[idx] / 10000000 }}
              {% else %}
                {{ discharge_min_price }}
              {% endif %}
            {% else %}
              {{ discharge_min_price }}
            {% endif %}
          # Effective threshold: max of min_price and top_percent threshold
          discharge_threshold: "{{ [discharge_min_price | float, discharge_price_threshold | float] | max }}"
          # Can we discharge at current price?
          can_discharge: "{{ (dyn_elec | float) >= (discharge_threshold | float) }}"
          # Time step (1 min in hours)
          dt: "{{ 1 / 60 }}"
          # Virtual EV - charges from solar excess first
          ev_daily: "{{ states('input_number.virtual_ev_daily_kwh') | float(5) }}"
          ev_consumed: "{{ states('input_number.virtual_ev_consumed_today') | float(0) }}"
      - variables:
          ev_remaining: "{{ [(ev_daily | float) - (ev_consumed | float), 0] | max }}"
          ev_charge_power: "{% if (raw_export_power | float) > 0 and (ev_remaining | float) > 0 %}{{ [(raw_export_power | float), (ev_remaining | float) / (dt | float)] | min }}{% else %}0{% endif %}"
          # Export power AFTER EV takes its share
          export_power: "{{ [(raw_export_power | float) - (ev_charge_power | float), 0] | max }}"
      # Update EV consumed counter
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_ev_consumed_today
        data:
          value: "{{ (ev_consumed | float) + (ev_charge_power | float) * (dt | float) }}"

      # ===== 10 kWh =====
      - variables:
          cap: 10
          soc: "{{ states('input_number.virtual_battery_10_soc') | float(0) }}"
      - variables:
          headroom: "{{ (100 - (soc | float)) / 100 * cap }}"
          above_min: "{{ [((soc | float) / 100 * cap) - (min_soc | float), 0] | max }}"
      - variables:
          cp: "{% if (export_power | float) > 0 and (soc | float) < 100 %}{{ [(export_power | float), (max_rate | float), (headroom | float) / (dt | float)] | min }}{% else %}0{% endif %}"
          dp: "{% if (import_power | float) > 0 and (can_discharge | bool) and ((soc | float) / 100 * cap) > (min_soc | float) %}{{ [(import_power | float), (max_rate | float), (above_min | float) / (dt | float)] | min }}{% else %}0{% endif %}"
      - variables:
          ce: "{{ (cp | float) * (dt | float) }}"
          de: "{{ (dp | float) * (dt | float) }}"
          excess: "{{ ((export_power | float) - (cp | float)) * (dt | float) }}"
          new_soc: "{{ [[(soc | float) + ((ce | float) / cap * 100) - ((de | float) / cap * 100), 0] | max, 100] | min }}"
          # 1. Zelfconsumptie (netto, minus opportunity cost)
          val_self: "{{ (de | float) * (dyn_elec | float) - (ce | float) * (dyn_feedin | float) }}"
          # 1b. Bruto zelfconsumptie (alleen besparing op netstroom)
          val_self_gross: "{{ (de | float) * (dyn_elec | float) }}"
          # 2. Verkoop overschot at dynamic rate
          val_export: "{{ [(excess | float), 0] | max * (dyn_feedin | float) }}"
          # 3. Arbitrage = dynamic total - flat total
          val_arb: "{{ 0 }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_soc
        data:
          value: "{{ new_soc }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_energy_in
        data:
          value: "{{ states('input_number.virtual_battery_10_energy_in') | float(0) + ce | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_energy_out
        data:
          value: "{{ states('input_number.virtual_battery_10_energy_out') | float(0) + de | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_savings_self
        data:
          value: "{{ states('input_number.virtual_battery_10_savings_self') | float(0) + val_self | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_savings_self_gross
        data:
          value: "{{ states('input_number.virtual_battery_10_savings_self_gross') | float(0) + val_self_gross | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_revenue_export
        data:
          value: "{{ states('input_number.virtual_battery_10_revenue_export') | float(0) + val_export | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_10_savings_arbitrage
        data:
          value: "{{ states('input_number.virtual_battery_10_savings_arbitrage') | float(0) + val_arb | float }}"

      # ===== 20 kWh =====
      - variables:
          cap: 20
          soc: "{{ states('input_number.virtual_battery_20_soc') | float(0) }}"
      - variables:
          headroom: "{{ (100 - (soc | float)) / 100 * cap }}"
          above_min: "{{ [((soc | float) / 100 * cap) - (min_soc | float), 0] | max }}"
      - variables:
          cp: "{% if (export_power | float) > 0 and (soc | float) < 100 %}{{ [(export_power | float), (max_rate | float), (headroom | float) / (dt | float)] | min }}{% else %}0{% endif %}"
          dp: "{% if (import_power | float) > 0 and (can_discharge | bool) and ((soc | float) / 100 * cap) > (min_soc | float) %}{{ [(import_power | float), (max_rate | float), (above_min | float) / (dt | float)] | min }}{% else %}0{% endif %}"
      - variables:
          ce: "{{ (cp | float) * (dt | float) }}"
          de: "{{ (dp | float) * (dt | float) }}"
          excess: "{{ ((export_power | float) - (cp | float)) * (dt | float) }}"
          new_soc: "{{ [[(soc | float) + ((ce | float) / cap * 100) - ((de | float) / cap * 100), 0] | max, 100] | min }}"
          val_self: "{{ (de | float) * (dyn_elec | float) - (ce | float) * (dyn_feedin | float) }}"
          val_self_gross: "{{ (de | float) * (dyn_elec | float) }}"
          val_export: "{{ [(excess | float), 0] | max * (dyn_feedin | float) }}"
          val_arb: "{{ 0 }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_soc
        data:
          value: "{{ new_soc }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_energy_in
        data:
          value: "{{ states('input_number.virtual_battery_20_energy_in') | float(0) + ce | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_energy_out
        data:
          value: "{{ states('input_number.virtual_battery_20_energy_out') | float(0) + de | float }}"
      - action: input_number.set_value
