# Virtual Battery Simulation Package
#
# Simulates 4 battery sizes (10, 20, 30, 40 kWh) in parallel.
# Includes a virtual EV that consumes 5 kWh/day from solar excess BEFORE
# the battery gets it, reducing the battery's business case.
#
# Tracks 2 financial values per battery:
#   1. Zelfconsumptie: savings from self-consumption at dynamic Zonneplan tariff
#   2. Verkoop overschot: revenue from solar excess at dynamic feed-in tariff
#
# Uses Slimmelezer (grid), Enphase Envoy (solar), Zonneplan (dynamic tariffs).
# Does NOT account for saldering (net metering).

