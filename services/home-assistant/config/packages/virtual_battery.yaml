          entity_id: input_number.virtual_battery_20_savings_self
        data:
          value: "{{ states('input_number.virtual_battery_20_savings_self') | float(0) + val_self | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_revenue_export
        data:
          value: "{{ states('input_number.virtual_battery_20_revenue_export') | float(0) + val_export | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_savings_arbitrage
        data:
          value: "{{ states('input_number.virtual_battery_20_savings_arbitrage') | float(0) + val_arb | float }}"

      # ===== 30 kWh =====
      - variables:
          cap: 30
          soc: "{{ states('input_number.virtual_battery_30_soc') | float(0) }}"
      - variables:
          headroom: "{{ (100 - (soc | float)) / 100 * cap }}"
