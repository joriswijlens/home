input_select:
  virtual_battery_chart_period:
    name: "Grafiek periode"
    options:
      - "3 maanden"
      - "6 maanden"
      - "12 maanden"
    initial: "3 maanden"
    icon: mdi:calendar-range

# Monthly utility meters for financial tracking
# Resets monthly, HA stores each period in long-term statistics for lookback
utility_meter:
  # --- 10 kWh ---
  vb_10kwh_bruto_zelfconsumptie_maand:
    source: sensor.vb_10kwh_bruto_zelfconsumptie
    name: "VB 10kWh Bruto Zelfconsumptie Maand"
    cycle: monthly
  vb_10kwh_verkoop_overschot_maand:
    source: sensor.vb_10kwh_verkoop_overschot
    name: "VB 10kWh Verkoop Overschot Maand"
    cycle: monthly
  # --- 20 kWh ---
  vb_20kwh_bruto_zelfconsumptie_maand:
    source: sensor.vb_20kwh_bruto_zelfconsumptie
    name: "VB 20kWh Bruto Zelfconsumptie Maand"
    cycle: monthly
