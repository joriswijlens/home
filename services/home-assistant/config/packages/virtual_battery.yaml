          dp: "{% if import_power > 0 and soc > min_soc %}{{ [import_power, max_rate, above_min / dt] | min }}{% else %}0{% endif %}"
      - variables:
          ce: "{{ (cp | float) * dt }}"
          de: "{{ (dp | float) * dt }}"
          excess: "{{ (export_power - (cp | float)) * dt }}"
          new_soc: "{{ [[soc + (ce / cap * 100) - (de / cap * 100), 0] | max, 100] | min }}"
          val_self: "{{ de * flat_elec - ce * flat_feedin }}"
          val_export: "{{ [excess, 0] | max * dyn_feedin }}"
          val_arb: "{{ (de * dyn_elec - ce * dyn_feedin) - (de * flat_elec - ce * flat_feedin) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_soc
        data:
          value: "{{ new_soc }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_energy_in
        data:
          value: "{{ states('input_number.virtual_battery_20_energy_in') | float(0) + ce | float }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.virtual_battery_20_energy_out
        data:
          value: "{{ states('input_number.virtual_battery_20_energy_out') | float(0) + de | float }}"
      - action: input_number.set_value
        target:
