    name: "VB 30kWh SoC"
    min: 0
    max: 100
    step: 0.01
  virtual_battery_30_energy_in:
    name: "VB 30kWh Energy In"
    min: 0
    max: 9999999
    step: 0.001
  virtual_battery_30_energy_out:
